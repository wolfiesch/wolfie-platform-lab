name: Publish health API image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - bun.lock
      - package.json
      - src/**
      - .github/workflows/publish-image.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/wolfiesch/wolfie-platform-lab:main
            ghcr.io/wolfiesch/wolfie-platform-lab:sha-${{ github.sha }}

      - name: Update manifest image tag
        run: |
          image="ghcr.io/wolfiesch/wolfie-platform-lab:sha-${GITHUB_SHA}"
          sed -i "s#image: .*#image: ${image}#" k8s/health-api.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/health-api.yaml
          git commit -m "chore: update health api image ${GITHUB_SHA::12}" || exit 0
          git push
