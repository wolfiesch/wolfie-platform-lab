apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k8s-health-caddy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/wolfiesch/wolfie-platform-lab.git
    targetRevision: main
    path: gitops/platform/caddy
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-lab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
