apiVersion: v1
kind: ConfigMap
metadata:
  name: k8s-health-caddy-config
  namespace: platform-lab
data:
  Caddyfile: |
    :8080 {
      encode zstd gzip

      @caddyHealth path /caddy-healthz
      handle @caddyHealth {
        respond "ok" 200
      }

      @k8sHealth host k8s-health.wolfie.gg
      handle @k8sHealth {
        reverse_proxy wolfie-health-api.platform-lab.svc.cluster.local:80
      }

      @omp host omp.wolfie.gg
      handle @omp {
        redir * https://wolfiesch.github.io/omp-episodic-memory{uri} 302
      }

      respond "not_found" 404
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-health-caddy
  namespace: platform-lab
  labels:
    app.kubernetes.io/name: k8s-health-caddy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: k8s-health-caddy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8s-health-caddy
      annotations:
        platform-lab.wolfie.gg/caddy-config-revision: omp-route-v3
    spec:
      containers:
        - name: caddy
          image: caddy:2.8-alpine
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/caddy/Caddyfile
              subPath: Caddyfile
              readOnly: true
          readinessProbe:
            httpGet:
              path: /caddy-healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /caddy-healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: k8s-health-caddy-config
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-health-caddy
  namespace: platform-lab
  labels:
    app.kubernetes.io/name: k8s-health-caddy
spec:
  # Host-level edge Caddy proxies here while the 80/443 listener remains outside K3s.
  clusterIP: 10.43.7.40
  selector:
    app.kubernetes.io/name: k8s-health-caddy
  ports:
    - name: http
      port: 80
      targetPort: http
