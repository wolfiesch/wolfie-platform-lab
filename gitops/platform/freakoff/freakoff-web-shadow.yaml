apiVersion: apps/v1
kind: Deployment
metadata:
  name: freakoff-web-shadow
  namespace: platform-lab
  labels:
    app.kubernetes.io/name: freakoff-web-shadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: freakoff-web-shadow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: freakoff-web-shadow
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: web
          image: freakoff-web:latest
          imagePullPolicy: IfNotPresent
          command: ["npm", "run", "start"]
          ports:
            - name: http
              containerPort: 13000
          envFrom:
            - secretRef:
                name: freakoff-shadow-env
          volumeMounts:
            - name: upload-tmp
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1024Mi
      volumes:
        - name: upload-tmp
          hostPath:
            path: /var/lib/docker/volumes/freakoff_upload_tmp/_data
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: freakoff-web-shadow
  namespace: platform-lab
  labels:
    app.kubernetes.io/name: freakoff-web-shadow
spec:
  clusterIP: 10.43.7.41
  selector:
    app.kubernetes.io/name: freakoff-web-shadow
  ports:
    - name: http
      port: 80
      targetPort: http
