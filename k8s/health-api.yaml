apiVersion: v1
kind: Namespace
metadata:
  name: platform-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wolfie-health-api
  namespace: platform-lab
  labels:
    app.kubernetes.io/name: wolfie-health-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wolfie-health-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wolfie-health-api
    spec:
      containers:
        - name: api
          image: ghcr.io/wolfiesch/wolfie-platform-lab:sha-5b5baf0fd582712032858ebf3b07678ad74544a8
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: SERVICE_NAME
              value: wolfie-health-api
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: wolfie-health-api
  namespace: platform-lab
  labels:
    app.kubernetes.io/name: wolfie-health-api
spec:
  # Host-level Caddy proxies to this Service, so the lab keeps a stable upstream.
  clusterIP: 10.43.7.39
  selector:
    app.kubernetes.io/name: wolfie-health-api
  ports:
    - name: http
      port: 80
      targetPort: http
